<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>網頁格式轉換</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f0f0; margin: 0; padding: 0; }
  h1 { text-align: center; margin: 20px 0; }

  .wrapper {
    display: flex;
    justify-content: center; /* 中央對齊 */
    gap: 20px;
    padding: 20px;
  }

  .left {
    width: 300px; /* 左側按鈕欄位 */
  }
  .left input, .left button {
    display: block;
    width: 100%;
    margin-top: 10px;
  }

  
  .right iframe {
  width: 500px;            /* 固定寬度 */
  height: 720px;           /* 拉長高度 */
  border-radius: 12px;     /* 圓角 */
  box-shadow: 2px 2px 10px rgba(0,0,0,0.2); /* 陰影 */
  border: none;            /* 去掉原本邊框 */
}

    iframe {
    width: 100%;
    height: 600px;
    border: none;
  }

  /* 視窗邊緣空白 */
  .spacer {
    width: 20px;
  }

  /* 按鈕 */
  .left {
  display: flex;
  flex-direction: column;
  align-items: center; /* 水平置中 */
  margin-top: 500px;   /* 下移 */
}
  
  .left input {
  margin-bottom: 30px;   /* 上傳欄位和下載按鈕之間間距 */
}
  
  .left button {
  width: 150px;           /* 減少寬度 */
  height: 60px;           /* 加高 */
  border-radius: 12px;    /* 圓角 */
  background-color: #F3F3F3; /* 可愛粉色背景 */
  color: #303030;           /* 字體顏色 */
  border: none;           /* 去掉邊框 */
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
  box-shadow: 2px 2px 6px rgba(0,0,0,0.2); /* 輕微陰影 */
  transition: all 0.2s ease;
  margin-top: 25px;
}

.left button:hover {
  background-color: #D6E0F3;  /* 滑鼠移上去顏色變亮 */
  color: white;
  transform: translateY(-2px); /* 懸浮感 */
}

</style>
</head>
<body>
<h1>網頁格式轉換</h1>

<div class="wrapper">
  <div class="spacer"></div>

  <div class="left">
  <!-- 拖曳上傳區 -->
  <div id="dropZone" 
     style="
        border: 2px dashed #ccc; /* 虛線 */
        border-radius: 12px;      /* 圓角 */ 
        width: 180px; 
        height: 90px; 
        cursor: pointer; 
        display: flex; 
        justify-content: center;  /* 水平置中 */
        align-items: center;      /* 垂直置中 */
        text-align: center;
     ">
  拖曳檔案或點擊上傳
</div>


  <!-- 隱藏的原始檔案選擇按鈕 -->
  <input type="file" id="fileInput" accept=".html" multiple style="display:none;">

  <!-- 下載按鈕 -->
  <button id="downloadBtn">下載(.HTML)</button>
</div>


  <div class="right">
    <iframe id="preview"></iframe>
  </div>

  <div class="spacer"></div>
</div>

<script>
let originalContent = '';

// 上傳 HTML
function handleFiles(files) {
  if (!files || files.length === 0) return;
  const file = files[0]; // 只預覽第一個檔案
  const reader = new FileReader();
  reader.onload = function(e){
    originalContent = e.target.result;
    updatePreview();
  };
  reader.readAsText(file, 'UTF-8');
}

document.getElementById('fileInput').addEventListener('change', function(e){
  handleFiles(e.target.files);
});


// 點擊拖曳區打開檔案選擇
document.getElementById('dropZone').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});

const dropZone = document.getElementById('dropZone');

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();          // 阻止預設打開檔案行為
  e.dataTransfer.dropEffect = 'copy';
});

dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  handleFiles(e.dataTransfer.files); // 傳檔案給讀取函數
});

// 替換規則
const rules = [
  {from: `<div class="msg-timestamp">00:00</div>`, to: ``},
  {from: `#FFFFFF`, to: `#FAFAFA`},
  {from: `#F9CEDC`, to: `#D6E0F3`},
  {from: `#FFF5F8`, to: `#EEEFF2`},
  {from: `max-width:280px`, to: `max-width:325px`},
  {from: `margin-right:10px`, to: `margin-right:0`},
  {from: `<meta name="viewport" content="width=device-width, initial-scale=1.0">`, to: `<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0">`},
  {from: `.character-name{ font-size:14px`, to: `.character-name{ font-size:15px`},
  {from: `16px;font-size:15px`, to: `16px;font-size:16px`},
  {from: `body{ font-family:`, to: `body { font-weight: 400;font-family:`},
  {from: `  </style>`, to: `@media (min-width: 600px) {\n  .pc .msg-content {\n    margin-right: 20px;\n  }\n}\n  </style>`},
  {from: `.ava-pc {\n      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj48cGF0aCBmaWxsPSIjZTBlMGUwIiBkPSJNMjU2IDUxMmMxNDEuNCAwIDI1Ni0xMTQuNiAyNTYtMjU2UzM5Ny40IDAgMjU2IDBTMCAxMTQuNiAwIDI1NnMxMTQuNiAyNTYgMjU2IDI1NnoiLz48cGF0aCBmaWxsPSIjYWFhIiBkPSJNMjU2IDI4OGMtNTMgMC05Ni00My05Ni05NnM0My05NiA5Ni05NnM5NiA0MyA5NiA5Ni00MyA5Ni05NiA5NnptMCAxMjhjLTEwNSAwLTE5Mi03MS0xOTItMTU5LjggMC0zMC4yIDEwLjgtNTguNyAzMC40LTgxLjZDMTI2LjIgMTM3LjE4IDE4Ny44IDExMiAyNTYgMTEyczEyOS44IDI1LjE4IDE2MS42IDYyLjZjMTkuNiAyMi45IDMwLjQgNTEuNCAzMC40IDgxLjZDNDQ4IDM0NSAzNjEgNDE2IDI1NiA0MTZ6Ii8+PC9zdmc+');`, to: `.ava-pc {\n       display: none;`},
  {from: `@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap');`, to: `@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');\n    html {\n      text-size-adjust: 100%;\n      -webkit-text-size-adjust: 100%;\n    }\n    `}
];

// 更新預覽
function updatePreview() {
  let content = originalContent;
  rules.forEach(rule => {
    const fromRegex = new RegExp(rule.from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gs');
    content = content.replace(fromRegex, rule.to);
  });
  document.getElementById('preview').srcdoc = content;
}

// 下載 HTML
document.getElementById('downloadBtn').addEventListener('click', function(){
  let content = originalContent;
  rules.forEach(rule => {
  const fromRegex = new RegExp(rule.from.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gs');
  content = content.replace(fromRegex, rule.to);
});


  const blob = new Blob([content], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;

  // 取原始檔名，加上 "_C"
  const originalName = document.getElementById('fileInput').files[0].name;
  const dotIndex = originalName.lastIndexOf('.');
  const nameWithoutExt = dotIndex >= 0 ? originalName.slice(0, dotIndex) : originalName;
  a.download = nameWithoutExt + '_C.html';

  a.click();
  URL.revokeObjectURL(url);
});

</script>
</body>
</html>
