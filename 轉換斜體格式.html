<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>轉換斜體格式</title>

<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
    margin: 0 auto;
    background-color: #f9f9f9;
  }

  /* 桌機最大寬度限制 */
  @media (min-width: 601px) {
    body { max-width: 800px; }
  }

  h2 { text-align: center; color: #333; }

  textarea {
    width: 100%;
    height: 200px;
    margin-bottom: 10px;
    padding: 10px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
  }

  #output {
    white-space: pre-wrap;
    border: 1px solid #ccc;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
    background-color: #fff;
    height: 200px;        /* 固定高度 */
    overflow-y: auto;     /* 捲軸 */
  }

  button {
    padding: 10px 20px;
    font-size: 16px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.2s;
  }
  button:hover { opacity: 0.8; }

  #pasteBtn { background-color: #4CAF50; color: white; }
  #copyBtn { background-color: #2196F3; color: white; }
  #downloadBtn { background-color: #FF9800; color: white; }
  .transform-btn { background-color: #f0f0f0; color: black; }


  label { font-weight: bold; color: #555; }

  .button-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

/* 手機：兩欄 */
@media (max-width: 600px) {
  .button-row button {
    flex: 0 0 calc(50% - 10px); /* 一列兩個 */
  }
}

/* 桌機：原本大小 */
@media (min-width: 600px) {
  .button-row button {
    flex: 0 0 auto;
  }
}

</style>
</head>
<body>

<h2>轉換斜體格式</h2>

<label>上傳文字檔 (.txt)：</label>
<input type="file" id="fileInput" accept=".txt">
<br><br>

<label>輸入欄位：</label>
<textarea id="inputText" placeholder="在這裡貼上或輸入文字"></textarea>

<!-- 兩欄：貼上＋複製 -->
<div class="button-row" style="margin-top:10px;">
  <button id="pasteBtn">📋 貼上</button>
  <button id="copyBtn">✂️ 複製</button>
</div>

<h3>轉換結果：</h3>
<div id="output"></div>

<!-- 兩欄：轉換＋下載 -->
<div class="button-row" style="margin-top:10px;">
  <button onclick="runTransform()">轉換</button>
  <button id="downloadBtn">⬇️ 下載 (.txt)</button>
</div>

<script>
let latestOutput = "";

function transformText(text) {
  text = text.replace(/(^|\n)/g, "$1@#%");
  text = text.replace(/(\n|$)/g, "@#%$1");
  text = text.replace(/@#%「([^」]+)」/g, "@#%「$1」@#%");
  text = text.replace(/「([^」]+)」@#%/g, "@#%「$1」@#%");
  text = text.replace(/：「([^」]+)」/g, "：*「$1」*");
  text = text.replace(/@#%@#%/g, "");
  text = text.replace(/@#%/g, "*");
  text = text.replace(/」\*(\n|$)/g, "」$1");
  return text;
}

function runTransform() {
  const input = inputArea.value;
  if (!input) return;
  const output = transformText(input);
  outputArea.textContent = output;
  latestOutput = output;
}

function downloadText() {
  if (!latestOutput) return alert("請先輸入或貼上文字！");
  const blob = new Blob([latestOutput], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "轉換結果.txt";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

const inputArea = document.getElementById("inputText");
const outputArea = document.getElementById("output");

document.getElementById("pasteBtn").addEventListener("click", async () => {
  try {
    const text = await navigator.clipboard.readText();
    inputArea.value = text;
    runTransform();
  } catch {
    alert("⚠️ 無法讀取剪貼簿內容，請確認已授權");
  }
});

document.getElementById("copyBtn").addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(outputArea.innerText);
    const btn = document.getElementById("copyBtn");
    btn.innerText = "已複製！";
    setTimeout(() => btn.innerText = "✂️ 複製", 1200);
  } catch {
    alert("⚠️ 複製失敗，請手動選取");
  }
});

document.getElementById("downloadBtn").addEventListener("click", downloadText);

document.getElementById('fileInput').addEventListener('change', event => {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    inputArea.value = e.target.result;
    runTransform();
  };
  reader.readAsText(file, "UTF-8");
});

inputArea.addEventListener("input", runTransform);
</script>

</body>
</html>
