<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>網頁樣式轉換</title>
<style>
body { font-family: Arial, sans-serif; background: #f0f0f0; margin: 0; padding: 0; }
h1 { text-align: center; margin: 20px 0; }

.wrapper {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.left {
  width: 300px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative; /* 讓底部按鈕絕對定位相對於這個容器 */
  height: 720px;      /* 可依右側 iframe 高度設定 */
}

/* 變數輸入區 */
.left label {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 15px;
  font-size: 14px;
}
.left label input {
  width: 200px;
  padding: 6px 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-top: 5px;
}

/* 清空 & 還原按鈕並排 */
.btn-group {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 10px;
}
.btn-group button {
  width: 120px;
  height: 45px;
  border-radius: 12px;
  background-color: #F3F3F3;
  color: #303030;
  border: none;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
  box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
  transition: all 0.2s ease;
}
.btn-group button:hover {
  background-color: #D6E0F3;
  color: white;
  transform: translateY(-2px);
}



/* 拖曳區 + 下載按鈕固定底部 */
.bottom-actions {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  position: absolute;
  bottom: 20px; /* 距離容器底部 20px */
}

#dropZone {
  border: 2px dashed #ccc;
  border-radius: 12px;
  width: 180px;
  height: 90px;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.bottom-actions button {
  width: 150px;          
  height: 50px;
  border-radius: 12px;
  background-color: #F3F3F3;
  color: #303030;
  border: none;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
  box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
  transition: all 0.2s ease;
}
.bottom-actions button:hover {
  background-color: #D6E0F3;
  color: white;
  transform: translateY(-2px);
}


/* 預覽區 */
.right iframe {
  width: 500px;
  height: 720px;
  border-radius: 12px;
  box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
  border: none;
}

.spacer { width: 20px; }

/* === 手機版（真正手機裝置用） === */
@media (max-width: 1024px) {

  .bottom-actions {
    position: static !important; /* ⭐ 取消固定底部 */
    margin-top: 20px;
    padding-bottom: 40px;
  }
  
  .wrapper {
    flex-direction: column;
    padding: 0;
    gap: 0;
  }

  /* 讓預覽 iframe 填滿螢幕寬度 */
  .right iframe {
    width: calc(100vw - 10px);
    margin: 0 5px; /* 保險用 */
    height: calc(100vh - 60px);
    border-radius: 10px;
}

  /* 左側變成側邊欄 */
  .left {
    position: fixed;
    top: 0;
    left: -280px; /* 初始隱藏 */
    width: 260px;
    height: 100vh;
    overflow-y: auto; /* 防止內容太高 */
    background: #fff;
    z-index: 2000;
    box-shadow: 3px 0 8px rgba(0,0,0,0.25);
    transition: left 0.3s ease;
    padding-top: 70px;    
  }

  /* 左欄展開 */
  .left.active {
    left: 0;
  }

  .spacer { display: none; }

  /* 手機按鈕 */
  #menuToggle {
    display: block;
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 3000;
    background: #F3F3F3;
    border: none;
    border-radius: 10px;
    padding: 10px 15px;
    font-size: 18px;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.25);
  }

  h1 {
    margin-top: 70px;
  }
}

/* 桌面版：按鈕隱藏 */
@media (min-width: 1025px) {
  #menuToggle {
    display: none;
  }
}


#overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.45);
  z-index: 1500;
}

/* ===== 新增：輸入框+附屬色票/拉條 ===== */
.input-group {
  display: flex;
  gap: 8px;
  align-items: center;
  width: 200px;
}

.input-group input[type="text"],
.input-group input[type="number"] {
  flex: 1;
}

.input-group input[type="color"] {
  width: 34px;
  height: 34px;
  padding: 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  cursor: pointer;
}

.input-group input[type="range"] {
  width: 80px;
  height: 32px;
  cursor: pointer;
}
  
</style>
</head>
<body>
<button id="menuToggle">☰樣式</button>
<h1>網頁樣式轉換</h1>

<div id="overlay"></div>

<div class="wrapper">
  <div class="spacer"></div>
  <div class="left">

    <!-- 變數輸入區 -->
<label>網頁背景色
  <div class="input-group">
    <input type="text" id="var1" placeholder="#FFF5F8">
    <input type="color" id="var1_color">
  </div>
</label>

<label>角色對話色
  <div class="input-group">
    <input type="text" id="var2" placeholder="#FFFFFF">
    <input type="color" id="var2_color">
  </div>
</label>

<label>玩家對話色
  <div class="input-group">
    <input type="text" id="var3" placeholder="#F9CEDC">
    <input type="color" id="var3_color">
  </div>
</label>

<label>對話寬(px)
  <div class="input-group">
    <input type="number" id="var4" placeholder="280">
    <input type="range" id="var4_range" min="280" max="400" step="10">
  </div>
</label>



    <!-- 清空 & 還原按鈕 -->
    <div class="btn-group">
      <button id="restoreBtn">還原預設</button>
      <button id="clearBtn">清空</button>
    </div>

    <!-- 拖曳上傳 + 下載按鈕 -->
    <div class="bottom-actions">
      <div id="dropZone">拖曳檔案或點擊上傳<br>HTML檔</div>

      <button id="downloadBtn">下載(.HTML)</button>
    </div>
    <input type="file" id="fileInput" accept=".html" multiple style="display:none;">
  </div>

  <div class="right">
    <iframe id="preview"></iframe>
  </div>
  <div class="spacer"></div>
</div>

<script>
let originalContent = '';
const defaultVars = { var1:'#FFF5F8', var2:'#FFFFFF', var3:'#F9CEDC', var4:'280' };
let userVars = JSON.parse(localStorage.getItem('userVars')) || {...defaultVars};
let currentFile = null; // 儲存目前上傳的檔案，點擊或拖曳都用它


// 渲染輸入框
function renderVars() {
  document.getElementById('var1').value = userVars.var1 || '';
  document.getElementById('var2').value = userVars.var2 || '';
  document.getElementById('var3').value = userVars.var3 || '';
  document.getElementById('var4').value = userVars.var4 || '';
}
renderVars();

// ===== 新增：同步右側 color/range 的初始值 =====
function syncControlsFromVars() {
  // 顏色三組
  ['1','2','3'].forEach(i => {
    const t = document.getElementById(`var${i}`).value;
    if (t && /^#?[0-9A-Fa-f]{6}$/.test(t)) {
      document.getElementById(`var${i}_color`).value =
        t.startsWith('#') ? t : '#' + t;
    }
  });

  // range
  document.getElementById('var4_range').value = document.getElementById('var4').value || 280;
}
syncControlsFromVars();

// 更新 userVars
function updateVars() {
  userVars.var1 = document.getElementById('var1').value.trim();
  userVars.var2 = document.getElementById('var2').value.trim();
  userVars.var3 = document.getElementById('var3').value.trim();
  userVars.var4 = document.getElementById('var4').value.trim();
  localStorage.setItem('userVars', JSON.stringify(userVars));
  updatePreview();
}

// ===== 新增：color → text 同步 =====
['1','2','3'].forEach(i => {
  document.getElementById(`var${i}_color`).addEventListener('input', e => {
    const v = e.target.value.toUpperCase();
    document.getElementById(`var${i}`).value = v;
    updateVars();
  });
});

// ===== 新增：range → number 同步 =====
document.getElementById('var4_range').addEventListener('input', e => {
  document.getElementById('var4').value = e.target.value;
  updateVars();
});


// 即時監聽
['var1','var2','var3','var4'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateVars);
});

// 清空
document.getElementById('clearBtn').addEventListener('click', () => {
  userVars = { var1:'', var2:'', var3:'', var4:'' };
  renderVars();
  localStorage.removeItem('userVars');
  updatePreview();
  syncControlsFromVars();
});

// 還原
document.getElementById('restoreBtn').addEventListener('click', () => {
  userVars = {...defaultVars};
  renderVars();
  localStorage.setItem('userVars', JSON.stringify(userVars));
  updatePreview();
  syncControlsFromVars();
});

// 上傳檔案
function handleFiles(files) {
  if(!files || files.length === 0) return;
  const file = files[0];
  currentFile = file; // 儲存檔案

  const reader = new FileReader();
  reader.onload = e => {
    originalContent = e.target.result;
    updatePreview();
  };
  reader.readAsText(file,'UTF-8');
}

document.getElementById('fileInput').addEventListener('change', e=>handleFiles(e.target.files));
document.getElementById('dropZone').addEventListener('click', ()=>document.getElementById('fileInput').click());
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e=>{e.preventDefault(); e.dataTransfer.dropEffect='copy';});
dropZone.addEventListener('drop', e=>{e.preventDefault(); handleFiles(e.dataTransfer.files);});

// 處理替換
function processContent(content, maxMessages = 20) {
  let result = content;
  
  if(userVars.var1) result = result.replace(/body\s*{[^}]*background-color\s*:\s*[^;]+;/gi,
    `body { font-family:'Noto Sans TC','Helvetica Neue',Arial,sans-serif;line-height:1.6;margin:0;padding:0;background-color:${userVars.var1};`);
  if(userVars.var2) result = result.replace(/\.char\s*\.msg-content\s*{[^}]*background-color\s*:\s*[^;]+;/gi,
    `.char .msg-content { background-color:${userVars.var2};`);
  if(userVars.var3) result = result.replace(/\.pc\s*\.msg-content\s*{[^}]*background-color\s*:\s*[^;]+;/gi,
    `.pc .msg-content { background-color:${userVars.var3};`);
  if(userVars.var4) result = result.replace(/\.msg-container\s*{[^}]*max-width\s*:\s*[^;]+px/gi,
    `.msg-container { display:flex;flex-direction:column;max-width:${userVars.var4}px`);
  
  // 只保留前 maxMessages 條訊息（包含頭像）
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = result;
  const messages = tempDiv.querySelectorAll('.char, .pc'); // 整個訊息容器
  messages.forEach((msg, index) => {
    if(index >= maxMessages){
      msg.remove();
    }
  });

  return tempDiv.innerHTML;
}

// 更新預覽
function updatePreview() {
  const content = originalContent || '';
  const MAX_PREVIEW = 20; // 想要顯示的最後 N 條訊息
  document.getElementById('preview').srcdoc = processContent(content);
}

// 下載 HTML
document.getElementById('downloadBtn').addEventListener('click', function(){
  const content = processContent(originalContent); // 保留原本變數替換功能
  const blob = new Blob([content], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;

  // 取原始檔名，加上 "_C"
  const originalName = currentFile ? currentFile.name : 'processed.html';
  const dotIndex = originalName.lastIndexOf('.');
  const nameWithoutExt = dotIndex >= 0 ? originalName.slice(0, dotIndex) : originalName;
  a.download = nameWithoutExt + '_C.html';

  a.click();
  URL.revokeObjectURL(url);
});

// 手機版 左側滑出功能
const menuBtn = document.getElementById('menuToggle');
const leftPanel = document.querySelector('.left');

// 點背景 → 關閉側欄
const overlay = document.getElementById('overlay');

menuBtn.addEventListener('click', () => {
  leftPanel.classList.toggle('active');
  overlay.style.display = leftPanel.classList.contains('active') ? 'block' : 'none';
});

// 點遮罩關閉
overlay.addEventListener('click', () => {
  leftPanel.classList.remove('active');
  overlay.style.display = 'none';
});

  
</script>
</body>
</html>
