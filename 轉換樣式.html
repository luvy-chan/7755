<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>з¶Ій ЃжЁЈејЏиЅ‰жЏ›</title>
<style>
body { font-family: Arial, sans-serif; background: #f0f0f0; margin: 0; padding: 0; }
h1 { text-align: center; margin: 20px 0; }

.wrapper {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.left {
  width: 300px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* и®Љж•ёијёе…ҐеЌЂ */
.left label {
  display: block;
  margin-top: 10px;
  font-size: 14px;
}
.left input {
  width: 100%;
  padding: 6px 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-top: 3px;
}

/* жЊ‰й€• */
.left button {
  width: 150px;
  height: 50px;
  border-radius: 12px;
  background-color: #F3F3F3;
  color: #303030;
  border: none;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
  box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
  margin-top: 15px;
  transition: all 0.2s ease;
}
.left button:hover {
  background-color: #D6E0F3;
  color: white;
  transform: translateY(-2px);
}

/* ж‹–ж›іеЌЂ */
#dropZone {
  border: 2px dashed #ccc;
  border-radius: 12px;
  width: 180px;
  height: 90px;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  margin-top: 20px;
}

/* й ђи¦ЅеЌЂ */
.right iframe {
  width: 500px;
  height: 720px;
  border-radius: 12px;
  box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
  border: none;
}
.spacer { width: 20px; }
</style>
</head>
<body>
<h1>з¶Ій ЃжЁЈејЏиЅ‰жЏ›</h1>

<div class="wrapper">
  <div class="spacer"></div>
  <div class="left">
    <!-- и®Љж•ёијёе…ҐеЌЂ -->
    <label>и®Љж•ё1 (body background-color):<input type="text" id="var1"></label>
    <label>и®Љж•ё2 (.char .msg-content background-color):<input type="text" id="var2"></label>
    <label>и®Љж•ё3 (.pc .msg-content background-color):<input type="text" id="var3"></label>
    <label>и®Љж•ё4 (.msg-container max-width px):<input type="text" id="var4"></label>

    <!-- ж“ЌдЅњжЊ‰й€• -->
    <button id="restoreBtn">й‚„еЋџй ђиЁ­</button>
    <button id="clearBtn">жё…з©є</button>

    <!-- ж‹–ж›ідёЉе‚іеЌЂ -->
    <div id="dropZone">ж‹–ж›іжЄ”жЎ€ж€–й»ћж“ЉдёЉе‚і</div>
    <input type="file" id="fileInput" accept=".html" multiple style="display:none;">
    <button id="downloadBtn">дё‹иј‰(.HTML)</button>
  </div>

  <div class="right">
    <iframe id="preview"></iframe>
  </div>
  <div class="spacer"></div>
</div>

<script>
let originalContent = '';
const defaultVars = { var1:'#FFFFFF', var2:'#F9CEDC', var3:'#FFF5F8', var4:'280' };
let userVars = JSON.parse(localStorage.getItem('userVars')) || {...defaultVars};

// жёІжџ“ијёе…ҐжЎ†
function renderVars() {
  document.getElementById('var1').value = userVars.var1 || '';
  document.getElementById('var2').value = userVars.var2 || '';
  document.getElementById('var3').value = userVars.var3 || '';
  document.getElementById('var4').value = userVars.var4 || '';
}
renderVars();

// ж›ґж–° userVars
function updateVars() {
  userVars.var1 = document.getElementById('var1').value.trim();
  userVars.var2 = document.getElementById('var2').value.trim();
  userVars.var3 = document.getElementById('var3').value.trim();
  userVars.var4 = document.getElementById('var4').value.trim();
  localStorage.setItem('userVars', JSON.stringify(userVars));
  updatePreview();
}

// еЌіж™‚з›ЈиЃЅ
['var1','var2','var3','var4'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateVars);
});

// жё…з©є
document.getElementById('clearBtn').addEventListener('click', () => {
  userVars = { var1:'', var2:'', var3:'', var4:'' };
  renderVars();
  localStorage.removeItem('userVars');
  updatePreview();
});

// й‚„еЋџ
document.getElementById('restoreBtn').addEventListener('click', () => {
  userVars = {...defaultVars};
  renderVars();
  localStorage.setItem('userVars', JSON.stringify(userVars));
  updatePreview();
});

// дёЉе‚іжЄ”жЎ€
function handleFiles(files) {
  if(!files || files.length===0) return;
  const file = files[0];
  const reader = new FileReader();
  reader.onload = e => {
    originalContent = e.target.result;
    updatePreview();
  };
  reader.readAsText(file,'UTF-8');
}
document.getElementById('fileInput').addEventListener('change', e=>handleFiles(e.target.files));
document.getElementById('dropZone').addEventListener('click', ()=>document.getElementById('fileInput').click());
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e=>{e.preventDefault(); e.dataTransfer.dropEffect='copy';});
dropZone.addEventListener('drop', e=>{e.preventDefault(); handleFiles(e.dataTransfer.files);});

// и™•зђ†ж›їжЏ›
function processContent(content) {
  let result = content;
  if(userVars.var1) result = result.replace(/body\s*{[^}]*background-color\s*:\s*[^;]+;/gi,
    `body { font-family:'Noto Sans TC','Helvetica Neue',Arial,sans-serif;line-height:1.6;margin:0;padding:0;background-color:${userVars.var1};`);
  if(userVars.var2) result = result.replace(/\.char\s*\.msg-content\s*{[^}]*background-color\s*:\s*[^;]+;/gi,
    `.char .msg-content { background-color:${userVars.var2};`);
  if(userVars.var3) result = result.replace(/\.pc\s*\.msg-content\s*{[^}]*background-color\s*:\s*[^;]+;/gi,
    `.pc .msg-content { background-color:${userVars.var3};`);
  if(userVars.var4) result = result.replace(/\.msg-container\s*{[^}]*max-width\s*:\s*[^;]+px/gi,
    `.msg-container { display:flex;flex-direction:column;max-width:${userVars.var4}px`);
  return result;
}

// ж›ґж–°й ђи¦Ѕ
function updatePreview() {
  const content = originalContent || '';
  document.getElementById('preview').srcdoc = processContent(content);
}

// дё‹иј‰
document.getElementById('downloadBtn').addEventListener('click', function(){
  const content = processContent(originalContent);
  const blob = new Blob([content], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);

  const file = document.getElementById('fileInput').files[0];
  const originalName = file ? file.name : 'processed.html';
  const dotIndex = originalName.lastIndexOf('.');
  const nameWithoutExt = dotIndex>=0 ? originalName.slice(0,dotIndex) : originalName;
  a.download = nameWithoutExt+'_C.html';
  a.click();
  URL.revokeObjectURL(a.href);
});
</script>
</body>
</html>
