<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>批量替換工具</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background-color: #f9f9f9;
  }
  h1 { text-align: center; }
  textarea {
    width: 100%;
    height: 150px;
    margin-bottom: 10px;
    padding: 10px;
    font-family: monospace;
    font-size: 14px;
  }
  #output {
    width: 100%;
    height: 150px;
    padding: 10px;
    font-family: monospace;
    font-size: 14px;
    background-color: #fff;
    border: 1px solid #ccc;
    white-space: pre-wrap;
  }
  button {
    padding: 8px 12px;
    margin-top: 5px;
    cursor: pointer;
  }
  label {
    font-weight: bold;
  }
  .rule-row {
    display: flex;
    gap: 10px;
    margin-bottom: 5px;
    align-items: flex-start;
  }
  .rule-row textarea {
    flex: 1;
    padding: 5px;
    font-family: monospace;
    height: 60px;
  }
  .removeRule {
    background-color: #f44336;
    color: white;
    border: none;
    width: 25px;
    height: 25px;
    padding: 0;
    font-weight: bold;
    line-height: 25px;
    text-align: center;
    cursor: pointer;
    border-radius: 3px;
    flex-shrink: 0;        /* 防止被壓縮 */
    margin-top: 17px;      /* 與 textarea 垂直對齊 */
    font-size: 16px;
  }
  .removeRule:hover {
    background-color: #d32f2f;
  }
</style>
</head>
<body>

<h1>批量替換工具</h1>

<label>輸入程式碼：</label>
<textarea id="input" placeholder="在此輸入程式碼..."></textarea>

<h3>替換規則（左欄: 被替換文字，右欄: 替換成文字）</h3>
<div id="rulesContainer">
  <div class="rule-row">
    <textarea class="find" placeholder="被替換文字"></textarea>
    <textarea class="replace" placeholder="替換成文字"></textarea>
    <button class="removeRule">−</button>
  </div>
</div>
<button id="addRule">新增規則</button>

<button id="copyBtn">複製結果</button>

<h3>替換後結果</h3>
<div id="output"></div>

<script>
const input = document.getElementById('input');
const output = document.getElementById('output');
const rulesContainer = document.getElementById('rulesContainer');

function applyRules(text) {
  const rows = rulesContainer.querySelectorAll('.rule-row');
  rows.forEach(row => {
    const findText = row.querySelector('.find').value;
    const replaceText = row.querySelector('.replace').value;
    if(findText) {
      const regex = new RegExp(findText, 'gs'); // 支援跨行替換
      text = text.replace(regex, replaceText);
    }
  });
  return text;
}

function updateOutput() {
  output.textContent = applyRules(input.value);
}

// 監聽輸入框變化
input.addEventListener('input', updateOutput);
rulesContainer.addEventListener('input', updateOutput);

// 複製結果
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(output.textContent).then(() => {
    alert('已複製到剪貼簿！');
  });
});

// 新增規則行
document.getElementById('addRule').addEventListener('click', () => {
  const row = document.createElement('div');
  row.className = 'rule-row';
  row.innerHTML = `
    <textarea class="find" placeholder="被替換文字"></textarea>
    <textarea class="replace" placeholder="替換成文字"></textarea>
    <button class="removeRule">−</button>
  `;
  rulesContainer.appendChild(row);
});

// 刪除規則按鈕
rulesContainer.addEventListener('click', (e) => {
  if(e.target.classList.contains('removeRule')) {
    e.target.parentElement.remove();
    updateOutput();
  }
});
</script>

</body>
</html>
