<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>批量替換工具</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background-color: #f9f9f9;
  }
  h1 { text-align: center; }
  textarea {
    width: 100%;
    height: 150px;
    margin-bottom: 10px;
    padding: 10px;
    font-family: monospace;
    font-size: 14px;
  }
  #output {
    width: 100%;
    height: 150px;
    padding: 10px;
    font-family: monospace;
    font-size: 14px;
    background-color: #fff;
    border: 1px solid #ccc;
    white-space: pre-wrap;
  }
  button {
    padding: 8px 12px;
    margin-top: 5px;
    cursor: pointer;
  }
  label { font-weight: bold; }
  .rule-row {
    display: flex;
    gap: 10px;
    margin-bottom: 5px;
    align-items: flex-start;
  }
  .rule-row textarea {
    flex: 1;
    padding: 5px;
    font-family: monospace;
    height: 60px;
  }
  .removeRule {
    background-color: #f44336;
    color: white;
    border: none;
    width: 25px;
    height: 25px;
    padding: 0;
    font-weight: bold;
    line-height: 25px;
    text-align: center;
    cursor: pointer;
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 17px;
    font-size: 16px;
  }
  .removeRule:hover {
    background-color: #d32f2f;
  }

  /* 浮動提示訊息 */
  #toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #4caf50;
    color: white;
    padding: 10px 18px;
    border-radius: 5px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
    font-size: 14px;
  }
</style>
</head>
<body>

<h1>批量替換工具</h1>

<label>輸入程式碼：</label>
<button id="pasteBtn">📋 從剪貼簿貼上</button>
<textarea id="input" placeholder="在此輸入程式碼..."></textarea>

<h3>替換規則（左欄: 被替換文字，右欄: 替換成文字）</h3>
<div id="rulesContainer"></div>

<button id="addRule">新增規則</button>
<button id="copyBtn">複製結果</button>

<h3>替換後結果</h3>
<div id="output"></div>

<div id="toast">已複製到剪貼簿！</div>

<script>
const input = document.getElementById('input');
const output = document.getElementById('output');
const rulesContainer = document.getElementById('rulesContainer');
const toast = document.getElementById('toast');

/* -----------------------------
          規則暫存功能
--------------------------------*/
function saveRules() {
  const rows = rulesContainer.querySelectorAll('.rule-row');
  const data = [];

  rows.forEach(row => {
    data.push({
      find: row.querySelector('.find').value,
      replace: row.querySelector('.replace').value
    });
  });

  localStorage.setItem("replaceRules", JSON.stringify(data));
}

function loadRules() {
  const saved = localStorage.getItem("replaceRules");
  if (!saved) { addRuleRow(); return; }

  const rules = JSON.parse(saved);
  rulesContainer.innerHTML = "";

  rules.forEach(rule => addRuleRow(rule.find, rule.replace));
}

/* -----------------------------
            替換邏輯
--------------------------------*/
function applyRules(text) {
  const rows = rulesContainer.querySelectorAll('.rule-row');
  rows.forEach(row => {
    const findText = row.querySelector('.find').value;
    const replaceText = row.querySelector('.replace').value;

    if (findText) {
      // 全字串安全替換，不用 regex
      text = text.split(findText).join(replaceText);
    }
  });
  return text;
}

function updateOutput() {
  output.textContent = applyRules(input.value);
}

/* -----------------------------
        ️ 自動消失提示
--------------------------------*/
function showToast() {
  toast.style.opacity = "1";
  setTimeout(() => {
    toast.style.opacity = "0";
  }, 1500);
}

/* -----------------------------
         DOM 事件
--------------------------------*/
input.addEventListener('input', updateOutput);

rulesContainer.addEventListener('input', () => {
  updateOutput();
  saveRules();
});

/* --- 複製結果（不跳 alert） --- */
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(output.textContent).then(() => {
    showToast();
  });
});

/* --- 新增規則 --- */
document.getElementById('addRule').addEventListener('click', () => {
  addRuleRow();
  saveRules();
});

/* --- 刪除規則 --- */
rulesContainer.addEventListener('click', (e) => {
  if(e.target.classList.contains('removeRule')) {
    e.target.parentElement.remove();
    updateOutput();
    saveRules();
  }
});

/* --- 從剪貼簿貼到輸入欄位 --- */
document.getElementById('pasteBtn').addEventListener('click', async () => {
  const text = await navigator.clipboard.readText();
  input.value = text;
  updateOutput();
});

/* -----------------------------
       建立規則行 function
--------------------------------*/
function addRuleRow(find = "", replace = "") {
  const row = document.createElement('div');
  row.className = 'rule-row';
  row.innerHTML = `
    <textarea class="find" placeholder="被替換文字">${find}</textarea>
    <textarea class="replace" placeholder="替換成文字">${replace}</textarea>
    <button class="removeRule">−</button>
  `;
  rulesContainer.appendChild(row);
}

/* -----------------------------
       進入頁面時載入規則
--------------------------------*/
loadRules();
updateOutput();

</script>

</body>
</html>
