<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>開頭轉換</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; background: #f9f9f9; text-align: center; }
  textarea { width: 90%; height: 120px; margin-bottom: 10px; font-family: monospace; font-size: 14px; display: block; margin-left: auto; margin-right: auto; }
  button { padding: 8px 20px; font-size: 14px; cursor: pointer; margin: 5px; }
  .buttons { margin-bottom: 10px; text-align: center; }
</style>
</head>
<body>
<h2>開頭轉換</h2>

<textarea id="inputText" placeholder="貼上內容"></textarea>

<div class="buttons">
    <button onclick="pasteFromClipboard()">📋 貼上</button>
    <button onclick="copyResult()">✂️ 複製</button>
</div>

<textarea id="outputText" placeholder="轉換結果" readonly></textarea>

<script>
// 將文字區塊轉換
function convertText(text) {
    const pattern = /=+[\r\n]+([\s\S]+?)[\r\n]+(\d{4})\.(\d{2})\.(\d{2})[^\r\n]*[\r\n]+=+/g;
    return text.replace(pattern, (match, roleLine, y, m, d) => {
        // 先取第一行
        let role = roleLine.split(/\r?\n/)[0].trim();
        // 只保留空白前的部分作為角色名字
        role = role.split(/\s/)[0];
        return `Date: ${y}-${m}-${d}\nCharacter: ${role}`;
    });
}



// 監控 inputText 有內容就自動轉換
document.getElementById('inputText').addEventListener('input', () => {
    const input = document.getElementById('inputText').value;
    const converted = convertText(input);
    document.getElementById('outputText').value = converted;
});

// 從剪貼簿貼上到輸入欄位並自動轉換
function pasteFromClipboard() {
    navigator.clipboard.readText()
        .then(text => {
            document.getElementById('inputText').value = text;
            document.getElementById('inputText').dispatchEvent(new Event('input'));
        })
        .catch(err => {
            console.error('無法讀取剪貼簿', err);
        });
}

// 複製結果到剪貼簿
function copyResult() {
    const output = document.getElementById('outputText').value;
    navigator.clipboard.writeText(output)
        .then(() => console.log('已複製到剪貼簿'))
        .catch(err => console.error('複製失敗', err));
}
</script>
</body>
</html>
