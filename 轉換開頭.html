<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天區塊自動轉換工具</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; background: #f9f9f9; }
  textarea { width: 100%; height: 300px; margin-bottom: 10px; font-family: monospace; font-size: 14px; }
  button { padding: 10px 20px; font-size: 14px; cursor: pointer; margin-right: 10px; }
</style>
</head>
<body>
<h2>聊天區塊自動轉換工具</h2>
<textarea id="inputText" placeholder="貼上原始文字..."></textarea>
<button onclick="copyAndPaste()">自動複製到剪貼簿</button>
<textarea id="outputText" placeholder="轉換結果會出現在這裡..." readonly></textarea>

<script>
function convertText(text) {
    // 正則抓每個區塊
    const pattern = /=+\n(.+?)\s*-\s*\n(\d{4})\.(\d{2})\.(\d{2}) .*?\n=+/gs;
    return text.replace(pattern, (match, role, y, m, d) => {
        return `Date: ${y}-${m}-${d}\nCharacter: ${role}`;
    });
}

// 監控 inputText，有內容就自動轉換
document.getElementById('inputText').addEventListener('input', () => {
    const input = document.getElementById('inputText').value;
    const converted = convertText(input);
    document.getElementById('outputText').value = converted;
});

// 一鍵自動複製並貼上
function copyAndPaste() {
    const output = document.getElementById('outputText').value;
    navigator.clipboard.writeText(output)
        .then(() => {
            console.log('已複製到剪貼簿');
        })
        .catch(err => {
            console.error('複製失敗', err);
        });
}
</script>
</body>
</html>
