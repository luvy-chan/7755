<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TXT 轉聊天頁面</title>
<style>
body { font-family:'Noto Sans TC', sans-serif; background:#FFF5F8; margin:0; padding:0; color:#333; }
.chat-container { max-width:600px; margin:0 auto; padding:20px; }
.date-divider { text-align:center; color:#888; margin:10px 0; font-size:12px; }
.char, .pc { display:flex; margin-bottom:15px; align-items:flex-start; }
.avatar { width:40px; height:40px; border-radius:50%; flex-shrink:0; background-size:cover; background-position:center; margin-right:10px; }
.ava-char { background-color:#E0E0E0; }
.ava-pc { background-color:#F9CEDC; }
.msg-container { max-width:70%; display:flex; flex-direction:column; }
.character-name { font-size:14px; color:#888; margin-bottom:4px; }
.msg-content { background:#fff; padding:8px 12px; border-radius:4px 16px 16px 16px; font-size:15px; }
.msg-timestamp { font-size:12px; color:#888; margin-top:4px; align-self:flex-end; }
.pc .msg-content { background:#F9CEDC; border-radius:16px 16px 4px 16px; }
</style>
</head>
<body>

<input type="file" id="fileInput" accept=".txt">
<div class="chat-container" id="chatContainer"></div>

<script>
const chatContainer = document.getElementById('chatContainer');
document.getElementById('fileInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    const text = evt.target.result;
    parseAndRender(text);
  };
  reader.readAsText(file, 'UTF-8');
});

// 範例 TXT 格式:
// [2025-05-23]
// 米羅: 你好，地球人。
// PC: 警告，請退後。
function parseAndRender(text){
  chatContainer.innerHTML = '';
  const lines = text.split(/\r?\n/);
  let currentDate = '';
  lines.forEach(line => {
    line = line.trim();
    if(!line) return;
    const dateMatch = line.match(/^\[(\d{4}-\d{2}-\d{2})\]$/);
    if(dateMatch){
      currentDate = dateMatch[1];
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.textContent = currentDate;
      chatContainer.appendChild(div);
    } else {
      const parts = line.split(':');
      if(parts.length < 2) return;
      const role = parts[0].trim();
      const msg = parts.slice(1).join(':').trim();

      const wrapper = document.createElement('div');
      wrapper.className = role.toLowerCase() === 'pc' ? 'pc' : 'char';

      const avatar = document.createElement('div');
      avatar.className = 'avatar ' + (role.toLowerCase() === 'pc' ? 'ava-pc' : 'ava-char');
      wrapper.appendChild(avatar);

      const msgContainer = document.createElement('div');
      msgContainer.className = 'msg-container';
      if(role.toLowerCase() !== 'pc'){
        const nameDiv = document.createElement('div');
        nameDiv.className = 'character-name';
        nameDiv.textContent = role;
        msgContainer.appendChild(nameDiv);
      }

      const contentDiv = document.createElement('div');
      contentDiv.className = 'msg-content';
      contentDiv.innerHTML = msg.replace(/\*\*(.+?)\*\*/g, '<em>$1</em>'); // 支援 **斜體**
      msgContainer.appendChild(contentDiv);

      const timeDiv = document.createElement('div');
      timeDiv.className = 'msg-timestamp';
      timeDiv.textContent = '00:00';
      msgContainer.appendChild(timeDiv);

      wrapper.appendChild(msgContainer);
      chatContainer.appendChild(wrapper);
    }
  });
}
</script>

</body>
</html>
