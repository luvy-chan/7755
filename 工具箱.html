<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>單機版拉比工具箱</title>
<style>
  body { font-family: 'Noto Sans TC', sans-serif; background:#f9f9f9; padding:20px; }
  .container { max-width:900px; margin:auto; }
  h1 { text-align:center; }
  .section { background:white; padding:15px; margin-bottom:20px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1);}
  .preview { border:1px solid #ccc; height:400px; overflow:auto; padding:10px; background:#fff;}
  .download-btn { background:#3b82f6;color:white;padding:10px 15px;border:none;border-radius:5px;cursor:pointer;}
  .char, .pc { display:flex; margin-bottom:15px; }
  .char .avatar, .pc .avatar { width:40px; height:40px; border-radius:50%; background:#aaa; flex-shrink:0; }
  .char .msg-container, .pc .msg-container { margin-left:10px; max-width:280px; }
  .pc { flex-direction: row-reverse; }
  .pc .msg-container { margin-right:10px; margin-left:0; }
  .msg-content { background:#f1f1f1; padding:8px 12px; border-radius:10px; white-space:pre-wrap; }
  .pc .msg-content { background:#f9cedc; }
  .character-name { font-size:14px; color:#666; margin-bottom:3px; }
  .date-divider { text-align:center; color:#888; font-size:12px; margin:10px 0; }
  .environment { text-align:center; color:#969696; margin:10px 0; font-size:14px; }
</style>
</head>
<body>
<div class="container">
<h1>單機版拉比工具箱</h1>

<div class="section">
  <h2>上傳 TXT 文件</h2>
  <input type="file" id="fileInput" accept=".txt">
</div>

<div class="section">
  <h2>預覽</h2>
  <div class="preview" id="preview"></div>
</div>

<div class="section">
  <button class="download-btn" id="downloadBtn">下載 HTML 文件</button>
</div>
</div>

<script>
function escapeHTML(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function parseTXT(txt){
  const lines = txt.split(/\r?\n/);
  let html = '';
  let currentDate = '';
  lines.forEach(line=>{
    let dateMatch = line.match(/^\[([\d\-\:\s]+)\] Environment/);
    if(dateMatch){
      currentDate = dateMatch[1].split(' ')[0];
      html += `<div class="date-divider">${currentDate}</div>`;
      html += `<div class="environment">${escapeHTML(line.replace(/^\[.*?\] Environment \(system\):\s*/,''))}</div>`;
    } else if(line.match(/^\[([\d\-\:\s]+)\] (.*?):/)){
      let m = line.match(/^\[([\d\-\:\s]+)\] (.*?):\s*(.*)/);
      let time = m[1].split(' ')[1];
      let name = m[2];
      let msg = m[3];
      html += `<div class="char"><div class="avatar"></div><div class="msg-container"><div class="character-name">${escapeHTML(name)}</div><div class="msg-content">${escapeHTML(msg)}</div></div><div class="msg-timestamp">${time}</div></div>`;
    } else if(line.trim()==='') {
      html += '<br>';
    } else {
      html += `<div class="char"><div class="avatar"></div><div class="msg-container"><div class="msg-content">${escapeHTML(line)}</div></div></div>`;
    }
  });
  return html;
}

document.getElementById('fileInput').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    const txt = evt.target.result;
    const html = parseTXT(txt);
    document.getElementById('preview').innerHTML = html;
  };
  reader.readAsText(file, 'UTF-8');
});

document.getElementById('downloadBtn').addEventListener('click', ()=>{
  const content = document.getElementById('preview').innerHTML;
  const fullHTML = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天紀錄</title>
<style>
body { font-family: 'Noto Sans TC', sans-serif; background:#f9f9f9; padding:20px; }
.char, .pc { display:flex; margin-bottom:15px; }
.char .avatar, .pc .avatar { width:40px; height:40px; border-radius:50%; background:#aaa; flex-shrink:0; }
.char .msg-container, .pc .msg-container { margin-left:10px; max-width:280px; }
.pc { flex-direction: row-reverse; }
.pc .msg-container { margin-right:10px; margin-left:0; }
.msg-content { background:#f1f1f1; padding:8px 12px; border-radius:10px; white-space:pre-wrap; }
.pc .msg-content { background:#f9cedc; }
.character-name { font-size:14px; color:#666; margin-bottom:3px; }
.date-divider { text-align:center; color:#888; font-size:12px; margin:10px 0; }
.environment { text-align:center; color:#969696; margin:10px 0; font-size:14px; }
</style>
</head>
<body>
<div class="chat-container">
${content}
</div>
</body>
</html>`;
  const blob = new Blob([fullHTML], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'chat.html';
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
