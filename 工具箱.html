<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拉比的工具箱 - 單機版</title>
<style>
  body { font-family: 'Noto Sans TC', Arial, sans-serif; margin: 0; padding: 20px; background: #f9f9f9; color: #333; }
  h1 { text-align:center; margin-bottom:20px; }
  .container { display:flex; gap:20px; }
  .panel { background:white; padding:20px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); flex:1; }
  .panel input[type="file"] { display:block; margin-bottom:10px; }
  .chat-preview { max-height:600px; overflow:auto; border:1px solid #ccc; padding:10px; background:#fff; border-radius:6px; }
  .char, .pc { display:flex; align-items:flex-start; margin-bottom:15px; }
  .pc { flex-direction:row-reverse; }
  .avatar { width:40px; height:40px; border-radius:50%; background-size:cover; margin:0 10px; }
  .msg-container { max-width:280px; display:flex; flex-direction:column; }
  .msg-content { padding:8px 12px; border-radius:16px 16px 16px 4px; background:#f0f0f0; margin-bottom:4px; }
  .pc .msg-content { background:#f9cedc; border-radius:16px 16px 4px 16px; }
  .character-name { font-size:14px; color:#888; margin-bottom:4px; }
  .msg-timestamp { font-size:12px; color:#888; align-self:flex-end; }
</style>
</head>
<body>

<h1>拉比的工具箱 - 單機版</h1>
<div class="container">
  <div class="panel">
    <h2>上傳 TXT 文件</h2>
    <input type="file" id="txtFile" accept=".txt">
    <button id="convertBtn">轉換為 HTML</button>
  </div>
  <div class="panel">
    <h2>預覽</h2>
    <div class="chat-preview" id="preview"></div>
  </div>
</div>

<script>
function escapeHTML(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('convertBtn').addEventListener('click', ()=>{
  const fileInput = document.getElementById('txtFile');
  if(!fileInput.files.length) return alert('請選擇 TXT 檔案');
  
  const file = fileInput.files[0];
  const reader = new FileReader();
  reader.onload = e=>{
    const txt = e.target.result;
    const chatHTML = txt.split(/\r?\n/).map(line=>{
      line = escapeHTML(line.trim());
      if(!line) return '';
      // 簡單判斷角色訊息
      let match = line.match(/^\[(.*?)\]\s*(.*?):\s*(.*)$/);
      if(match){
        const [_, timestamp, character, message] = match;
        const isPC = character === '♤' || character.toLowerCase() === 'player';
        return `
        <div class="${isPC ? 'pc' : 'char'}">
          <div class="avatar" style="background-image:url('');"></div>
          <div class="msg-container">
            <div class="character-name">${character}</div>
            <div class="msg-content">${message.replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>')}</div>
          </div>
          <div class="msg-timestamp">${timestamp.split(' ')[1]}</div>
        </div>`;
      }
      // 系統訊息
      return `<div class="msg-content">${line}</div>`;
    }).join('');
    
    document.getElementById('preview').innerHTML = chatHTML;
  };
  reader.readAsText(file, 'UTF-8');
});
</script>

</body>
</html>
