<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拉比的工具箱 - 單機版</title>
<style>
  body { font-family: Arial, sans-serif; background:#f9f9f9; margin:0; padding:20px; }
  .container { max-width:900px; margin:0 auto; }
  h1 { text-align:center; }
  input[type=file] { display:block; margin:10px 0; }
  select, input[type=range], button { margin:5px 0; padding:5px; }
  iframe { width:100%; height:600px; border:1px solid #ccc; margin-top:10px; }
</style>
</head>
<body>
<div class="container">
  <h1>拉比的工具箱 - 單機版</h1>
  <input type="file" id="txtFile" accept=".txt">
  <label>選擇訊息寬度：
    <input type="range" id="msgWidth" min="280" max="400" value="280"> <span id="widthLabel">280</span> px
  </label>
  <button id="convertBtn">轉換為 HTML</button>
  <button id="downloadBtn">下載 HTML</button>
  <iframe id="preview"></iframe>
</div>

<script>
const txtFileInput = document.getElementById('txtFile');
const msgWidthInput = document.getElementById('msgWidth');
const widthLabel = document.getElementById('widthLabel');
const convertBtn = document.getElementById('convertBtn');
const downloadBtn = document.getElementById('downloadBtn');
const preview = document.getElementById('preview');

let txtContent = '';

msgWidthInput.addEventListener('input', ()=> {
  widthLabel.textContent = msgWidthInput.value;
});

txtFileInput.addEventListener('change', e=>{
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(ev){ txtContent = ev.target.result; };
    reader.readAsText(file, 'UTF-8');
  }
});

function escapeHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function parseTXTtoHTML(txt){
  const lines = txt.split(/\r?\n/);
  let html = '';
  let dateDivider = '';
  let envBlock = '';
  
  for(let line of lines){
    line = line.trim();
    if(line.startsWith('[') && line.includes('Environment')){
      envBlock += `<div class="environment">${escapeHtml(line.split(':')[1].trim())}</div>\n`;
    } else if(line.startsWith('[') && line.includes(']')) {
      // 角色訊息
      const match = line.match(/\[([^\]]+)\]\s*(.*?):\s*(.*)/);
      if(match){
        const time = match[1].split(' ')[1];
        const char = match[2];
        const msg = match[3];
        html += `<div class="char"><div class="avatar ava-char"></div><div class="msg-container"><div class="character-name">${escapeHtml(char)}</div><div class="msg-content">${escapeHtml(msg)}</div></div><div class="msg-timestamp">${time}</div></div>\n`;
      }
    } else if(line && !line.startsWith('=') && !line.startsWith('*')){
      // 一般文字或敘述
      html += `<div class="environment">${escapeHtml(line)}</div>\n`;
    }
  }
  
  return `
  <html>
  <head>
    <meta charset="UTF-8">
    <style>
      body{ font-family:'Noto Sans TC',Arial,sans-serif; line-height:1.6; margin:0; padding:10px; }
      .chat-container{ max-width:600px; margin:0 auto; }
      .char{ display:flex; align-items:flex-start; margin-bottom:15px; }
      .avatar{ width:40px; height:40px; border-radius:50%; background:#ccc; flex-shrink:0; }
      .msg-container{ display:flex; flex-direction:column; max-width:${msgWidthInput.value}px; margin:0 10px; }
      .character-name{ font-size:14px; color:#888; margin-bottom:4px; }
      .msg-content{ background:#fff; padding:8px 12px; border-radius:4px 16px 16px 16px; }
      .environment{ color:#555; padding:5px; margin:5px 0; }
      .msg-timestamp{ font-size:12px; color:#888; margin-top:4px; align-self:flex-end; }
    </style>
  </head>
  <body>
    <div class="chat-container">
      ${html}
    </div>
  </body>
  </html>
  `;
}

convertBtn.addEventListener('click', ()=>{
  if(!txtContent) { alert('請先選擇 TXT 文件'); return; }
  const htmlStr = parseTXTtoHTML(txtContent);
  preview.srcdoc = htmlStr;
});

downloadBtn.addEventListener('click', ()=>{
  if(!txtContent) { alert('請先轉換'); return; }
  const htmlStr = parseTXTtoHTML(txtContent);
  const blob = new Blob([htmlStr], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'chat.html';
  a.click();
});
</script>
</body>
</html>
